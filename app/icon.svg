<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="chromeC" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#d9dfe9"/>
      <stop offset="75%" stop-color="#9aa3b5"/>
      <stop offset="100%" stop-color="#6e7689"/>
    </linearGradient>
    <linearGradient id="chromeBar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f7fb"/>
      <stop offset="55%" stop-color="#c4ccd9"/>
      <stop offset="100%" stop-color="#80889b"/>
    </linearGradient>
    <linearGradient id="blueBlade" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#1c44b8"/>
      <stop offset="55%" stop-color="#2f6df2"/>
      <stop offset="100%" stop-color="#a8d0ff"/>
    </linearGradient>
    <linearGradient id="blueSwoosh" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%" stop-color="#142f7a"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#5ea0ff"/>
    </linearGradient>
    <filter id="tipGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- silver C : open ring, gap facing right -->
  <path d="M 58 30
           A 22 22 0 1 0 58 66
           L 53 59.5
           A 14 14 0 1 1 53 36.5
           Z"
        fill="url(#chromeC)"/>

  <!-- blue swoosh blade hugging the C's lower curve -->
  <path d="M 24 60
           Q 44 71 62 52
           Q 52 72 31 64.5
           Q 26 62.5 24 60
           Z"
        fill="url(#blueSwoosh)"/>

  <!-- blue blade of the X, slender with sharp spike to top-right -->
  <path d="M 50 60
           L 83.5 15
           L 88 8.5
           L 86.5 17
           L 57 64.5
           Q 52.5 65.5 50 60
           Z"
        fill="url(#blueBlade)"/>
  <!-- spike glow -->
  <path d="M 83.5 15 L 88 8.5 L 86.5 17 Z" fill="#c4dfff" filter="url(#tipGlow)"/>

  <!-- silver descending stroke of the X -->
  <path d="M 54 33
           L 64 31
           L 84 67.5
           L 74.5 70
           Z"
        fill="url(#chromeBar)"/>
</svg>
